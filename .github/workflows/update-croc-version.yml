name: Update CrocGUI Version in HTML

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-version:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # Step 2: Get latest release info via GitHub API (using Octokit)
      - name: Get latest release info via GitHub API
        id: get_release
        uses: octokit/request-action@v2.x
        with:
          route: GET /repos/abakum/crocgui/releases/latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Step 3: Extract version from API response
      - name: Extract version
        id: extract_data
        run: |
          # Save API response to a temporary file
          echo '${{ steps.get_release.outputs.data }}' > release.json
          
          # Install jq for JSON parsing
          sudo apt-get update
          sudo apt-get install -y jq
          
          # Extract version (tag_name includes 'v' prefix, e.g., 'v1.11.47')
          NEW_VERSION=$(jq -r '.tag_name' release.json)
          echo "Latest version from GitHub: $NEW_VERSION"
          
          # Extract current version from croc/index.html
          CURRENT_VERSION=$(grep -oP 'const current = "\K[^"]+' croc/index.html 2>/dev/null || echo "")
          echo "Current version in HTML: $CURRENT_VERSION"
          
          # Check if versions match
          if [[ "$NEW_VERSION" == "$CURRENT_VERSION" ]]; then
            echo "Version is already up to date"
            echo "NEEDS_UPDATE=false" >> "$GITHUB_OUTPUT"
          else
            echo "Version needs to be updated"
            echo "NEEDS_UPDATE=true" >> "$GITHUB_OUTPUT"
          fi
          
          # Save versions for subsequent steps
          echo "NEW_VERSION=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "CURRENT_VERSION=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"

      # Step 4: Update version in croc/index.html (if needed)
      - name: Update version in croc/index.html
        if: steps.extract_data.outputs.NEEDS_UPDATE == 'true'
        env:
          NEW_VERSION: "${{ steps.extract_data.outputs.NEW_VERSION }}"
        run: |
          echo "Updating croc/index.html to version $NEW_VERSION..."
          
          # Update the const current = "vX.X.X"; line
          sed -i 's/const current = "[^"]*";/const current = "'"$NEW_VERSION"'";/' croc/index.html
          
          # Verify the change
          UPDATED_VERSION=$(grep -oP 'const current = "\K[^"]+' croc/index.html 2>/dev/null || echo "")
          echo "Updated version in file: $UPDATED_VERSION"
          
          if [[ "$UPDATED_VERSION" == "$NEW_VERSION" ]]; then
            echo "✅ Successfully updated version to $NEW_VERSION"
          else
            echo "❌ Failed to update version"
            exit 1
          fi

      # Step 5: Commit and push changes
      - name: Commit and push changes
        if: steps.extract_data.outputs.NEEDS_UPDATE == 'true'
        run: |
          # Configure git identity for the action
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          
          # Check if there are actual changes to commit
          if git diff --quiet croc/index.html; then
            echo "No changes to commit"
            exit 0
          fi
          
          # Add the modified file
          git add croc/index.html
          
          # Create commit with descriptive message
          COMMIT_MESSAGE="Update CrocGUI version to ${{ steps.extract_data.outputs.NEW_VERSION }}"
          echo "Creating commit: $COMMIT_MESSAGE"
          
          git commit -m "$COMMIT_MESSAGE"
          
          # Push changes
          echo "Pushing changes to repository..."
          git push origin main
          
          echo "✅ Successfully updated CrocGUI version from ${{ steps.extract_data.outputs.CURRENT_VERSION }} to ${{ steps.extract_data.outputs.NEW_VERSION }}"